<div class="theme-switcher">
  <div class="glow-ring"></div>
  <button
    type="button"
    class="theme-toggle-btn"
    (click)="toggleTheme()"
    [class.is-dark]="isDark"
    [attr.aria-pressed]="isDark"
    [attr.aria-label]="isDark ? 'Switch to light mode' : 'Switch to dark mode'"
    [title]="isDark ? 'Switch to light mode' : 'Switch to dark mode'"
  >
    <span class="icon-wrap">
      <!-- Sun icon -->
      <svg class="icon icon--sun" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="12" r="5" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="12" y1="2"  x2="12" y2="4"  stroke-width="1.8" stroke-linecap="round"/>
        <line x1="12" y1="20" x2="12" y2="22" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="2"  y1="12" x2="4"  y2="12" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="20" y1="12" x2="22" y2="12" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="4.22"  y1="4.22"  x2="5.64"  y2="5.64"  stroke-width="1.8" stroke-linecap="round"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="19.78" y1="4.22"  x2="18.36" y2="5.64"  stroke-width="1.8" stroke-linecap="round"/>
        <line x1="5.64"  y1="18.36" x2="4.22"  y2="19.78" stroke-width="1.8" stroke-linecap="round"/>
      </svg>

      <!-- Moon icon -->
      <svg class="icon icon--moon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"
              stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>
  </button>
</div>
